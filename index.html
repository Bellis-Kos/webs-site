<TYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz - Ανάπτυξη Web Εφαρμογών</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --correct-color: #10b981;
            --incorrect-color: #ef4444;
            --border-color: #e2e8f0;
            --exam-color: #8b5cf6;
            --exam-hover: #7c3aed;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { margin: 0; font-size: 24px; }
        p.subtitle { margin: 10px 0 0 0; opacity: 0.9; font-size: 14px; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            position: static; 
            background-color: var(--card-bg); 
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
        }

        select {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: white;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        .select-active {
            background-color: #10b981 !important;
            color: white !important;
            font-weight: bold;
        }
        #quizSearch {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            outline: none;
            width: 100%;
            max-width: 250px;
            transition: border-color 0.2s;
        }
        #quizSearch:focus {
            border-color: var(--primary-color);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 500;
        }

        .btn:hover { background-color: var(--primary-hover); }
        
        .btn:active {
            background-color: #1d4ed8;
            transform: scale(0.98);
        }

        .btn-exam {
            background-color: var(--exam-color);
        }
        .btn-exam:hover { background-color: var(--exam-hover); }
        
        .btn-exam:active {
            background-color: #6d28d9;
        }

        .btn-exam-active {
            background-color: #10b981 !important;
            color: white !important;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .quiz-container { display: flex; flex-direction: column; gap: 20px; }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
        }

        .question-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .chapter-tag {
            display: inline-block;
            background-color: #e0f2fe;
            color: #0369a1;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover { background-color: #f1f5f9; }
        .option-label input { margin-right: 12px; transform: scale(1.1); }

        .option-label.disabled {
            pointer-events: none;
        }

        .option-label.correct {
            background-color: #d1fae5 !important;
            border-color: var(--correct-color) !important;
            color: #065f46;
            font-weight: 600;
        }

        .option-label.incorrect {
            background-color: #fee2e2 !important;
            border-color: var(--incorrect-color) !important;
            color: #991b1b;
        }

        .score-box {
            background-color: white;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            display: none;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            transition: all 0.3s ease;
        }

        .score-box h2 {
            margin-top: 0;
            font-size: 24px;
        }

        .mistakes-container {
            margin-top: 25px;
            background-color: #ffffff;
            border: 1px solid #fca5a5;
            border-radius: 12px;
            padding: 20px;
            display: none;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .mistakes-title {
            color: #991b1b;
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #fee2e2;
            padding-bottom: 8px;
        }

        .mistake-item {
            padding: 12px;
            border-left: 4px solid var(--incorrect-color);
            background-color: #fff5f5;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }

        .mistake-q {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .mistake-details {
            font-size: 14px;
        }

        .badge-result {
            display: inline-block;
            padding: 8px 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 10px;
        }
        .badge-pass { background-color: #d1fae5; color: #065f46; }
        .badge-fail { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Interactive Quiz Γνώσεων</h1>
        <p class="subtitle">Ερωτήσεις Πολλαπλής Επιλογής & Προσομοίωση Εξετάσεων</p>
    </header>

    <div class="controls">
                <!-- Πρόσθεσε αυτή τη γραμμή στην αρχή των controls -->
        <input type="text" id="quizSearch" placeholder="🔍 Αναζήτηση ερώτησης..." onkeyup="filterBySearch()">

        <select id="chapterFilter" onchange="changeChapter()">
            <option value="all">Όλα τα Κεφάλαια</option>
            <option value="Κεφάλαιο 1">Κεφάλαιο 1</option>
            <option value="Κεφάλαιο 2">Κεφάλαιο 2</option>
            <option value="Κεφάλαιο 3">Κεφάλαιο 3</option>
            <option value="Κεφάλαιο 4">Κεφάλαιο 4</option>
            <option value="Κεφάλαιο 5">Κεφάλαιο 5</option>
            <option value="Κεφάλαιο 6">Κεφάλαιο 6</option>
            <option value="Κεφάλαιο 7">Κεφάλαιο 7</option>
            <option value="Κεφάλαιο 8">Κεφάλαιο 8</option>
            <option value="Κεφάλαιο 9">Κεφάλαιο 9</option>
            <option value="Κεφάλαια 10">Κεφάλαιο 10</option>
            <option value="Κεφάλαιο 11">Κεφάλαιο 11</option>
            <option value="Κεφάλαιο 12">Κεφάλαιο 12</option>
        </select>
        <button id="examBtn" class="btn btn-exam" onclick="startExamMode()">📝 Προσομοίωση Εξέτασης (40 Ερωτήσεις)</button>
        <button class="btn" onclick="finishQuiz()">Τελικό Σκόρ & Αναφορά Λαθών</button>
        <button class="btn" style="background-color: #64748b;" onclick="resetQuiz()">Επαναφορά</button>
    </div>

    <div id="quiz" class="quiz-container"></div>
    <div id="scoreBox" class="score-box"></div>
    
    <div id="mistakesContainer" class="mistakes-container">
        <div class="mistakes-title">❌ Αναφορά Λαθών (Επανεξέταση)</div>
        <div id="mistakesList"></div>
    </div>
</div>

<script>
        function filterBySearch() {
        const searchText = document.getElementById("quizSearch").value.toLowerCase();
        const cards = document.querySelectorAll(".question-card");

        cards.forEach(card => {
            const questionTitle = card.querySelector(".question-title").textContent.toLowerCase();
            const options = card.querySelector(".options-list").textContent.toLowerCase();
            
            // Αν το κείμενο αναζήτησης υπάρχει στον τίτλο ή στις επιλογές, δείξε την κάρτα, αλλιώς κρύψτην
            if (questionTitle.includes(searchText) || options.includes(searchText)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    }

    const quizData = [
        // ΚΕΦΑΛΑΙΟ 1
        {
            chapter: "Κεφάλαιο 1",
            q: "1. Τι είναι ένας αλγόριθμος;",

        },

            correct: "C"

        },

            correct: "C"
        },
        {
            chapter: "Κεφάλαιο 1",

        },

            q: "15. Ποιο από τα παρακάτω περιγράφει καλύτερα το MVC pattern;",

        {

            correct: "C"

        {
            chapter: "Κεφάλαιο 1",

            correct: "B"
        },
        {
            chapter: "Κεφάλαιο 1",
            q: "20. Ποιο από τα παρακάτω είναι χαρακτηριστικό του JSON;",
            options: { A: "Χρησιμοποιεί tags όπως το XML", B: "Είναι δυαδική μορφή δεδομένων", C: "Χρησιμοποιεί ζεύγη όνομα/τιμή και πίνακες", D: "Δεν υποστηρίζει αντικείμενα" },
            correct: "C"
        },
        {
            chapter: "Κεφάλαιο 1",
            q: "21. Ποια είναι η λειτουργία του WAR αρχείου σε Java Web εφαρμογές;",
            options: { A: "Εκτελείται απευθείας από τον browser", B: "Περιέχει μόνο HTML αρχεία", C: "Είναι αρχείο ZIP με δομή Java εφαρμογής", D: "Είναι αρχείο βάσης δεδομένων" },
            correct: "C"
        },
        {
            chapter: "Κεφάλαιο 1",
            q: "22. Ποιο IDE δεν αναφέρεται στη διάλεξη;",

        },

        // ΚΕΦΑΛΑΙΟ 2

    let currentQuestions = []; 
    let isExamMode = false;     

    function escapeHTML(str) {
        return str.replace(/&/g, "&amp;")
                  .replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;")
                  .replace(/"/g, "&quot;")
                  .replace(/'/g, "&#039;");
    }

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startExamMode() {
        isExamMode = true;
        
        // Χρωματισμός κουμπιού εξέτασης και καθαρισμός dropdown
        document.getElementById("examBtn").classList.add("btn-exam-active");
        document.getElementById("chapterFilter").classList.remove("select-active");
        document.getElementById("chapterFilter").value = "all";
        
        document.getElementById("scoreBox").style.display = "none";
        document.getElementById("mistakesContainer").style.display = "none";

        let shuffled = shuffleArray(quizData);
        currentQuestions = shuffled.slice(0, 40);

        renderQuestions();
    }

    function loadQuiz() {
        isExamMode = false;
        const filterValue = document.getElementById("chapterFilter").value;
        const examBtn = document.getElementById("examBtn");
        
        // Διαχείριση χρωμάτων ελέγχου χρηστών
        if (filterValue !== "all") {
            document.getElementById("chapterFilter").classList.add("select-active");
            examBtn.classList.remove("btn-exam-active");
        } else {
            document.getElementById("chapterFilter").classList.remove("select-active");
        }
        
        document.getElementById("scoreBox").style.display = "none";
        document.getElementById("mistakesContainer").style.display = "none";

        if (filterValue === "all") {
            currentQuestions = [...quizData];
        } else {
            currentQuestions = quizData.filter(item => item.chapter === filterValue);
        }

        renderQuestions();
    }

    function renderQuestions() {
        const quizContainer = document.getElementById("quiz");
        quizContainer.innerHTML = "";

        currentQuestions.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "question-card";
            card.setAttribute("id", `card-${index}`);
            card.setAttribute("data-correct", item.correct);

            card.innerHTML = `
                <span class="chapter-tag">${escapeHTML(item.chapter)}</span>
                <div class="question-title">${escapeHTML(item.q)}</div>
                <div class="options-list">
                    ${Object.entries(item.options).map(([key, value]) => `
                        <label class="option-label" data-key="${key}" onclick="handleOptionClick(${index}, '${key}')">
                            <input type="radio" name="question-${index}" value="${key}" style="display:none;">
                            <strong>${key}.</strong> &nbsp; ${escapeHTML(value)}
                        </label>
                    `).join('')}
                </div>
            `;
            quizContainer.appendChild(card);
        });
    }

    function handleOptionClick(qIndex, selectedKey) {
        const card = document.getElementById(`card-${qIndex}`);
        
        if (card.classList.contains("answered")) return;
        card.classList.add("answered");

        const correctKey = card.getAttribute("data-correct");
        const labels = card.querySelectorAll(".option-label");

        labels.forEach(label => {
            const labelKey = label.getAttribute("data-key");
            label.classList.add("disabled"); 

            if (labelKey === correctKey) {
                label.classList.add("correct"); 
            }
            if (labelKey === selectedKey && selectedKey !== correctKey) {
                label.classList.add("incorrect"); 
            }
        });

        currentQuestions[qIndex].userChoice = selectedKey;
    }

    function finishQuiz() {
        let score = 0;
        let mistakesHTML = "";

        currentQuestions.forEach((item, index) => {
            const card = document.getElementById(`card-${index}`);
            const userChoice = item.userChoice;

            if (userChoice !== undefined) {
                if (userChoice === item.correct) {
                    score++;
                } else {
                    mistakesHTML += `
                        <div class="mistake-item">
                            <div class="chapter-tag" style="margin-bottom:5px;">${escapeHTML(item.chapter)}</div>
                            <div class="mistake-q">${escapeHTML(item.q)}</div>
                            <div class="mistake-details">
                                <span style="color:var(--incorrect-color); font-weight:bold;">Η απάντησή σου:</span> ${userChoice}. ${escapeHTML(item.options[userChoice])} <br>
                                <span style="color:var(--correct-color); font-weight:bold;">Το σωστό:</span> ${item.correct}. ${escapeHTML(item.options[item.correct])}
                            </div>
                        </div>
                    `;
                }
            } else {
                mistakesHTML += `
                    <div class="mistake-item" style="border-left-color: #64748b; background-color: #f1f5f9;">
                        <div class="chapter-tag" style="margin-bottom:5px; background-color:#e2e8f0; color:#475569;">${escapeHTML(item.chapter)}</div>
                        <div class="mistake-q">${escapeHTML(item.q)}</div>
                        <div class="mistake-details">
                            <span style="color:#64748b; font-weight:bold;">Δεν απαντήθηκε.</span> <br>
                            <span style="color:var(--correct-color); font-weight:bold;">Το σωστό:</span> ${item.correct}. ${escapeHTML(item.options[item.correct])}
                        </div>
                    </div>
                `;
                if (card) {
                    const correctLabel = card.querySelector(`.option-label[data-key="${item.correct}"]`);
                    if (correctLabel) correctLabel.classList.add("correct");
                }
            }
        });

        const total = currentQuestions.length;
        const scoreBox = document.getElementById("scoreBox");
        scoreBox.style.display = "block";
        
        // Χρωματισμός του border του score-box σε πράσινο όπως ζήτησες
        scoreBox.style.borderColor = "#10b981";

        if (isExamMode) {
            let wrongCount = total - score;
            let formulaGrade = (score - (0.5 * wrongCount)) / 8;
            if (formulaGrade < 0) formulaGrade = 0;

            let passStatus = formulaGrade >= 2.5 ? 
                `<div class="badge-result badge-pass">🟢 ΠΕΡΑΣΑΤΕ!</div>` : 
                `<div class="badge-result badge-fail">🔴 ΑΠΕΤΥΧΑΤΕ (Κάτω από τη βάση του 2.5)</div>`;

            scoreBox.innerHTML = `
                <h2>Αποτελέσματα Εξέτασης</h2>
                <p>Σωστές Απαντήσεις: <strong>${score}</strong> / ${total}</p>
                <p>Λανθασμένες/Απαντήσεις: <strong>${wrongCount}</strong> / ${total}</p>
                <p>Τελική βαθμολογία του καθηγητή: <strong>${formulaGrade.toFixed(2)} / 5.0</strong></p>
                ${passStatus}
            `;
        } else {
            scoreBox.innerHTML = `
                <h2>Αποτελέσματα Μελέτης</h2>
                <p>Σωστά: <strong>${score}</strong> / ${total} (${Math.round((score/total)*100)}%)</p>
            `;
        }

        const mistakesContainer = document.getElementById("mistakesContainer");
        const mistakesList = document.getElementById("mistakesList");
        mistakesContainer.style.display = "block";
        
        if (mistakesHTML !== "") {
            mistakesList.innerHTML = mistakesHTML;
        } else {
            mistakesList.innerHTML = "<p style='color:var(--correct-color); font-weight:bold;'>💡 Εξαιρετικά! Κανένα λάθος!</p>";
        }

        scoreBox.scrollIntoView({ behavior: 'smooth' });
    }

    function resetQuiz() {
        // Καθαρισμός ενεργών χρωμάτων ελέγχου κατά το reset
        document.getElementById("examBtn").classList.remove("btn-exam-active");
        document.getElementById("chapterFilter").classList.remove("select-active");
        document.getElementById("chapterFilter").value = "all";
        
        // Καθαρισμός επιλογών
        currentQuestions.forEach(q => delete q.userChoice);

        if (isExamMode) {
            startExamMode();
        } else {
            loadQuiz();
        }
    }

    function changeChapter() {
        loadQuiz();
    }

    window.onload = loadQuiz;
